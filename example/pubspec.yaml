name: flame_visual_fx_example
resolution: workspace
description: An example project demonstrating the use of decorators in flame_visual_fx.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flame: any
  flame_visual_fx: any
  composite_atlas:
    path: ../../composite_atlas

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/animations/ember.png
    - assets/images/animations/bomb_ptero.png
